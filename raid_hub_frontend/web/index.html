<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="RAID HUB" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>RAID HUB</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      /* 초기 Splash 화면 스타일 */
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #flutter_splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .splash-icon {
        width: 60px;
        height: 60px;
        margin-bottom: 20px;
        color: #2196f3;
        opacity: 0.8;
      }

      .splash-title {
        margin: 0;
        font-size: 18px;
        color: #2196f3;
        letter-spacing: 8px;
        font-weight: bold;
        text-transform: uppercase;
      }

      .splash-subtitle {
        margin: 0;
        font-size: 48px;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: -1px;
        line-height: 1.1;
      }

      .splash-progress {
        width: 200px;
        height: 3px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        margin-top: 40px;
        overflow: hidden;
      }

      .splash-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #2196f3 0%, #2196f3 100%);
        opacity: 0.8;
        animation: progress 2s ease-in-out infinite;
      }

      @keyframes progress {
        0% {
          width: 0%;
        }
        50% {
          width: 100%;
        }
        100% {
          width: 0%;
        }
      }

      .splash-text {
        margin-top: 20px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.54);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Flutter가 준비되면 숨기기 */
      #flutter_splash.hidden {
        display: none;
      }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2K2DSKTCXL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-2K2DSKTCXL');
    </script>
  </head>
  <body>
    <div id="flutter_splash">
      <p class="splash-title">LOST ARK</p>
      <p class="splash-subtitle">RAID HUB</p>
      <div class="splash-progress">
        <div class="splash-progress-bar"></div>
      </div>
      <p class="splash-text">로딩 중...</p>
    </div>

    <script src="flutter_bootstrap.js" async>
      {{flutter_bootstrap_config}}
      window.flutterWebRenderer = "html";
    </script>

    <script>
      function hideSplash() {
        const splash = document.getElementById("flutter_splash");
        if (splash) {
          splash.classList.add("hidden");
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
          setTimeout(hideSplash, 3000);
        });
      } else {
        setTimeout(hideSplash, 3000);
      }

      window.addEventListener("flutter-web-init", () => {
        hideSplash();
      });
    </script>
  </body>
</html>
